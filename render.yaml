# Деплой API на Render (https://render.com) — бесплатный тариф.
# Как задеплоить (один раз) — см. DEPLOY.md:
#   1. Залей проект на GitHub.
#   2. На render.com → New → Blueprint → подключи репозиторий → Render прочитает этот файл.
#   3. Получишь адрес вида https://kuber-api.onrender.com — впиши его в EXPO_PUBLIC_API_URL.
services:
  - type: web
    name: kuber-api
    # ВАЖНО: для постоянной БД (disk ниже) нужен платный инстанс — поставь "starter"
    # (~$7/мес). На "free" диск недоступен и SQLite-база обнуляется при передеплое.
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    # Постоянный диск: база лежит на нём и переживает передеплой/перезапуск.
    # Раскомментируй вместе с DB_FILE ниже, когда переключишь plan на starter.
    # disk:
    #   name: kuber-data
    #   mountPath: /data
    #   sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAILS
        value: "gribioprime2@gmail.com"
      # Напоминания заказчикам (0 — выключить):
      - key: REMINDERS_ENABLED
        value: "1"
      # Путь к постоянной БД на диске (раскомментируй вместе с disk выше).
      # - key: DB_FILE
      #   value: /data/kuber.db
      #
      # --- Доставка кода подтверждения (задай в дашборде Render как Secret) ---
      # Каналы пробуются по приоритету, берётся первый успешный. Если ничего не
      # задано — dev-режим (код виден в приложении). Достаточно одного канала.
      #
      # Telegram Gateway (gatewayapi.telegram.org) — рекомендуется, дешевле SMS:
      # - key: TELEGRAM_GATEWAY_TOKEN
      #   sync: false
      # WhatsApp Cloud API (Meta) — нужен одобренный шаблон аутентификации:
      # - key: WHATSAPP_TOKEN
      #   sync: false
      # - key: WHATSAPP_PHONE_ID
      #   sync: false
      # - key: WHATSAPP_TEMPLATE   # имя шаблона, по умолч. verification_code
      #   value: "verification_code"
      # MAX (botapi.max.ru) — только со сценарием бота (см. server/sms.js):
      # - key: MAX_BOT_TOKEN
      #   sync: false
      # SMS.ru — запасной канал:
      # - key: SMSRU_API_ID
      #   sync: false
